  <script>
    // Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Mobile menu toggle
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if(menuBtn){
      menuBtn.addEventListener('click', ()=>{
        const expanded = menuBtn.getAttribute('aria-expanded') === 'true';
        menuBtn.setAttribute('aria-expanded', String(!expanded));
        if(mobileMenu) mobileMenu.classList.toggle('hidden');
      });
    }

    // Simple testimonials slider
    (function(){
      const track = document.getElementById('slider');
      if(!track) return;
      let index = 0;
      const slides = track.children.length;
      function move(){
        index = (index + 1) % slides;
        track.style.transform = `translateX(-${index * 100}%)`;
      }
      let t = setInterval(move, 4500);
      track.addEventListener('mouseenter', ()=> clearInterval(t));
      track.addEventListener('mouseleave', ()=> t = setInterval(move, 4500));
    })();

    // IntersectionObserver reveal
    (function(){
      const els = document.querySelectorAll('.glass, article, figure, blockquote');
      const io = new IntersectionObserver((entries)=>{
        entries.forEach(e=>{
          if(e.isIntersecting) e.target.classList.add('opacity-100','translate-y-0');
        });
      },{threshold:0.12});
      els.forEach(el=>{
        el.classList.add('opacity-0','translate-y-6','transition','duration-700','ease-out');
        io.observe(el);
      });
    })();

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(a=>{
      a.addEventListener('click', function(e){
        const href = this.getAttribute('href');
        if(href.length > 1){
          e.preventDefault();
          document.querySelector(href).scrollIntoView({behavior:'smooth'});
        }
      });
    });
  </script>
